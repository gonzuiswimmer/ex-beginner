<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Insert title here</title>
  </head>
  <body>
    <form
      action="exam04-result.html"
      th:action="@{/ex04/registerProfile}"
      th:object="${exam04Form}"
      method="post"
    >
      <h1>ユーザ登録</h1>
      <div th:errors="*{name}" style="color: red">エラー！</div>
      <label for="name">名前：</label>
      <input type="text" id="name" name="name" th:field="*{name}" /><br />
      <div th:errors="*{age}" style="color: red">エラー！</div>
      <label for="age">年齢：</label>
      <input type="text" id="age" name="age" th:field="*{age}" /><br />
      <div th:errors="*{comment}" style="color: red">エラー！</div>
      <label for="comment">コメント：</label><br />
      <textarea
        name="comment"
        id="commnet"
        cols="40"
        rows="5"
        th:field="*{comment}"
      ></textarea
      ><br />
      <button type="submit">登録</button>
    </form>
  </body>
</html>
